<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>审计中心</title>
  <style>
    :root {
      --bg: #f5efe7;
      --panel: #fffdf9;
      --line: #e4d6c5;
      --text: #241b15;
      --muted: #726657;
      --accent: #a15428;
      --accent-soft: #f3e3d1;
      --success: #1d7a4a;
      --warning: #9b6d1f;
      --danger: #b53f35;
      --radius: 18px;
      --shadow: 0 16px 38px rgba(73, 42, 19, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
    }

    .page {
      max-width: 1580px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 30px;
    }

    .header p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 900px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar button,
    .toolbar input {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 10px 14px;
      color: var(--text);
      font: inherit;
    }

    .toolbar button {
      background: var(--accent);
      border: 0;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .toolbar button.secondary {
      background: #eadcc9;
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 370px minmax(0, 1fr) 420px;
      gap: 20px;
    }

    .panel {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .stack,
    .list,
    .detail-list,
    .overview-grid {
      display: grid;
      gap: 12px;
    }

    .overview-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .overview-card,
    .card {
      background: var(--panel);
      border: 1px solid #eadcca;
      border-radius: 14px;
      padding: 14px;
    }

    .overview-card {
      background: linear-gradient(135deg, #fff6ec 0%, #fffdf9 100%);
    }

    .overview-card strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
      color: var(--accent);
      line-height: 1;
    }

    .card {
      display: grid;
      gap: 10px;
      cursor: pointer;
    }

    .card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(161, 84, 40, 0.14);
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
    }

    .subtle,
    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .hero {
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff6ec 0%, #fffdf9 100%);
      border: 1px solid #eadcca;
      margin-bottom: 14px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(230, 215, 196, 0.95);
      padding-bottom: 8px;
      font-size: 14px;
    }

    .detail-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .label {
      color: var(--muted);
      flex: 0 0 140px;
    }

    .value {
      flex: 1;
      text-align: right;
      word-break: break-word;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f2e4d5;
      color: #6d563f;
    }

    .chip.success { background: rgba(29, 122, 74, 0.12); color: var(--success); }
    .chip.warning { background: rgba(155, 109, 31, 0.14); color: var(--warning); }
    .chip.danger { background: rgba(181, 63, 53, 0.12); color: var(--danger); }

    .context-card {
      display: grid;
      gap: 8px;
      border: 1px solid #eadcca;
      background: #fffaf4;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
    }

    .context-card:hover {
      border-color: var(--accent);
    }

    .context-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .context-count {
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .button-row button {
      min-height: 36px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }

    .button-row button.primary {
      background: var(--accent);
      border: 0;
      color: #fff;
      font-weight: 700;
    }

    pre.payload {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #fbf6ef;
      border-radius: 14px;
      padding: 12px;
      font-size: 12px;
    }

    @media (max-width: 1280px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>审计中心</h1>
        <p>集中查看平台审计事件，并把任务、审批、能力、流程、评估、建议、工单之间的联动链路直接拉通展示，方便做问题追踪和治理回放。</p>
      </div>
      <div class="toolbar">
        <button id="taskPageBtn" class="secondary">任务面板</button>
        <button id="mcpPageBtn" class="secondary">MCP Center</button>
        <button id="workflowPageBtn" class="secondary">Workflow Center</button>
        <button id="capabilityPageBtn" class="secondary">Capability Center</button>
        <input id="actionFilterInput" placeholder="按 action 过滤" />
        <input id="actorFilterInput" placeholder="按 actor_id 过滤" />
        <input id="sourceFilterInput" placeholder="按 source 过滤" />
        <input id="eventTypeFilterInput" placeholder="按 event_type 过滤" />
        <input id="outcomeFilterInput" placeholder="按 outcome 过滤" />
        <input id="taskFilterInput" placeholder="按 task_id 过滤" />
        <input id="capabilityFilterInput" placeholder="按 capability_id 过滤" />
        <input id="workflowFilterInput" placeholder="按 workflow 过滤" />
        <input id="ticketFilterInput" placeholder="按 ticket_id 过滤" />
        <input id="suggestionFilterInput" placeholder="按 suggestion_id 过滤" />
        <input id="evaluationFilterInput" placeholder="按 evaluation_id 过滤" />
        <button id="loadBtn">加载审计</button>
      </div>
    </div>

    <div class="layout">
      <section class="stack">
        <div class="panel">
          <h2>审计治理概览</h2>
          <div id="auditOverview" class="overview-grid">
            <div class="empty">正在加载审计治理概览...</div>
          </div>
        </div>

        <div class="panel">
          <h2>上下文链路视图</h2>
          <div class="subtle">联动上下文分布与关联链路钻取</div>
          <div id="linkedContextSummary" class="subtle">正在加载上下文聚合...</div>
          <div id="linkedContextList" class="list" style="margin-top: 12px;">
            <div class="empty">正在加载上下文聚合...</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>审计事件列表</h2>
        <div id="auditMeta" class="subtle">正在加载审计事件...</div>
        <div id="auditList" class="list" style="margin-top: 12px;">
          <div class="empty">正在加载审计事件...</div>
        </div>
      </section>

      <section class="panel">
        <h2>审计详情</h2>
        <div id="auditDetail">
          <div class="empty">请选择左侧审计事件查看详情。</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      events: [],
      selectedIndex: 0,
      linkedContext: null,
      contextDrilldown: null,
    };

    const el = {
      taskPageBtn: document.getElementById("taskPageBtn"),
      mcpPageBtn: document.getElementById("mcpPageBtn"),
      workflowPageBtn: document.getElementById("workflowPageBtn"),
      capabilityPageBtn: document.getElementById("capabilityPageBtn"),
      actionFilterInput: document.getElementById("actionFilterInput"),
      actorFilterInput: document.getElementById("actorFilterInput"),
      sourceFilterInput: document.getElementById("sourceFilterInput"),
      eventTypeFilterInput: document.getElementById("eventTypeFilterInput"),
      outcomeFilterInput: document.getElementById("outcomeFilterInput"),
      taskFilterInput: document.getElementById("taskFilterInput"),
      capabilityFilterInput: document.getElementById("capabilityFilterInput"),
      workflowFilterInput: document.getElementById("workflowFilterInput"),
      ticketFilterInput: document.getElementById("ticketFilterInput"),
      suggestionFilterInput: document.getElementById("suggestionFilterInput"),
      evaluationFilterInput: document.getElementById("evaluationFilterInput"),
      loadBtn: document.getElementById("loadBtn"),
      auditOverview: document.getElementById("auditOverview"),
      linkedContextSummary: document.getElementById("linkedContextSummary"),
      linkedContextList: document.getElementById("linkedContextList"),
      auditMeta: document.getElementById("auditMeta"),
      auditList: document.getElementById("auditList"),
      auditDetail: document.getElementById("auditDetail"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      const text = await response.text();
      const body = text ? JSON.parse(text) : [];
      if (!response.ok) throw new Error(body?.detail || `HTTP ${response.status}`);
      return body;
    }

    function currentEvent() {
      return state.events[state.selectedIndex] || null;
    }

    function currentPayload() {
      return currentEvent()?.payload || {};
    }

    function currentContextPayload() {
      return state.contextDrilldown?.events?.[0]?.payload || {};
    }

    function buildQuery() {
      const query = new URLSearchParams();
      const pairs = {
        action: el.actionFilterInput.value.trim(),
        actor_id: el.actorFilterInput.value.trim(),
        source: el.sourceFilterInput.value.trim(),
        event_type: el.eventTypeFilterInput.value.trim(),
        outcome: el.outcomeFilterInput.value.trim(),
        task_id: el.taskFilterInput.value.trim(),
        capability_id: el.capabilityFilterInput.value.trim(),
        workflow: el.workflowFilterInput.value.trim(),
        ticket_id: el.ticketFilterInput.value.trim(),
        suggestion_id: el.suggestionFilterInput.value.trim(),
        evaluation_id: el.evaluationFilterInput.value.trim(),
      };
      Object.entries(pairs).forEach(([key, value]) => {
        if (value) query.set(key, value);
      });
      return query;
    }

    function syncQuery() {
      const url = new URL(window.location.href);
      const query = buildQuery();
      url.search = query.toString();
      window.history.replaceState({}, "", url);
    }

    function fillFiltersFromQuery() {
      const query = new URLSearchParams(window.location.search);
      el.actionFilterInput.value = query.get("action") || "";
      el.actorFilterInput.value = query.get("actor_id") || "";
      el.sourceFilterInput.value = query.get("source") || "";
      el.eventTypeFilterInput.value = query.get("event_type") || "";
      el.outcomeFilterInput.value = query.get("outcome") || "";
      el.taskFilterInput.value = query.get("task_id") || "";
      el.capabilityFilterInput.value = query.get("capability_id") || "";
      el.workflowFilterInput.value = query.get("workflow") || "";
      el.ticketFilterInput.value = query.get("ticket_id") || "";
      el.suggestionFilterInput.value = query.get("suggestion_id") || "";
      el.evaluationFilterInput.value = query.get("evaluation_id") || "";
    }

    function renderOverview(overview) {
      if (!overview) {
        el.auditOverview.innerHTML = '<div class="empty">暂无审计治理概览。</div>';
        return;
      }

      const cards = [
        ["事件总数", overview.total],
        ["成功事件", overview.success_count],
        ["失败事件", overview.failed_count],
        ["未完成事件", overview.pending_count],
        ["来源种类", Object.keys(overview.source_counts || {}).length],
        ["事件类型", Object.keys(overview.event_type_counts || {}).length],
      ];
      el.auditOverview.innerHTML = cards.map(([label, value]) => `
        <div class="overview-card">
          <div class="subtle">${escapeHtml(label)}</div>
          <strong>${escapeHtml(value)}</strong>
        </div>
      `).join("");
    }

    function renderLinkedContext() {
      const linkedContext = state.linkedContext;
      if (!linkedContext) {
        el.linkedContextSummary.textContent = "暂无上下文聚合。";
        el.linkedContextList.innerHTML = '<div class="empty">暂无上下文聚合。</div>';
        return;
      }

      const countText = Object.entries(linkedContext.context_counts || {})
        .map(([key, value]) => `${key}:${value}`)
        .join("，");
      el.linkedContextSummary.textContent = `当前筛选范围共 ${linkedContext.total_events} 条事件，链路上下文分布：${countText || "-"}`;

      const items = linkedContext.items || [];
      if (!items.length) {
        el.linkedContextList.innerHTML = '<div class="empty">当前筛选条件下没有可聚合的上下文链路。</div>';
        return;
      }

      el.linkedContextList.innerHTML = items.map(item => `
        <div
          class="context-card"
          data-context-type="${escapeHtml(item.context_type)}"
          data-context-id="${escapeHtml(item.context_id)}"
        >
          <div class="context-head">
            <div class="title">${escapeHtml(item.context_type)} / ${escapeHtml(item.context_id)}</div>
            <div class="context-count">${escapeHtml(item.event_count)} 条</div>
          </div>
          <div class="subtle">动作集合：${escapeHtml((item.actions || []).join(", ") || "-")}</div>
          <div class="subtle">最近事件：${escapeHtml(item.latest_action || "-")} / ${escapeHtml(item.latest_actor_id || "-")}</div>
          <div class="subtle">最近时间：${escapeHtml(item.latest_created_at || "-")}</div>
        </div>
      `).join("");

      el.linkedContextList.querySelectorAll("[data-context-type]").forEach(node => {
        node.addEventListener("click", async () => {
          const contextType = node.getAttribute("data-context-type") || "";
          const contextId = node.getAttribute("data-context-id") || "";
          await loadContextDrilldown(contextType, contextId);
        });
      });
    }

    function renderList() {
      el.auditMeta.textContent = `当前共 ${state.events.length} 条审计事件`;
      if (!state.events.length) {
        el.auditList.innerHTML = '<div class="empty">当前筛选条件下没有审计事件。</div>';
        el.auditDetail.innerHTML = '<div class="empty">请选择左侧审计事件查看详情。</div>';
        return;
      }

      el.auditList.innerHTML = state.events.map((item, index) => {
        const payload = item.payload || {};
        return `
          <div class="card ${index === state.selectedIndex ? "active" : ""}" data-index="${index}">
            <div class="title">${escapeHtml(item.action)}</div>
            <div class="subtle">actor_id：${escapeHtml(item.actor_id)}</div>
            <div class="subtle">source / event_type：${escapeHtml(item.source || "-")} / ${escapeHtml(item.event_type || "-")}</div>
            <div class="subtle">outcome：${escapeHtml(item.outcome ?? "-")} / 时间：${escapeHtml(item.created_at)}</div>
            <div class="subtle">task_id：${escapeHtml(payload.task_id || item.task_id || "-")}</div>
          </div>
        `;
      }).join("");

      el.auditList.querySelectorAll("[data-index]").forEach(node => {
        node.addEventListener("click", () => {
          state.selectedIndex = Number(node.getAttribute("data-index") || "0");
          renderList();
          renderDetail();
        });
      });
    }

    function buildOpenButtons(payload) {
      const buttons = [];
      if (payload.task_id) {
        buttons.push(`<button class="primary" type="button" data-open-task="${escapeHtml(payload.task_id)}">打开任务</button>`);
      }
      if (payload.workflow) {
        buttons.push(`<button type="button" data-open-workflow="${escapeHtml(payload.workflow)}">打开 Workflow</button>`);
      }
      if (payload.capability_id) {
        buttons.push(`<button type="button" data-open-capability="${escapeHtml(payload.capability_id)}">打开 Capability</button>`);
      }
      if (payload.ticket_id) {
        buttons.push(`<button type="button" data-open-ticket="${escapeHtml(payload.ticket_id)}">打开工单</button>`);
      }
      if (payload.evaluation_id) {
        buttons.push(`<button type="button" data-open-evaluation="${escapeHtml(payload.evaluation_id)}">打开评估</button>`);
      }
      if (payload.suggestion_id && payload.evaluation_id) {
        buttons.push(`<button type="button" data-open-suggestion="${escapeHtml(payload.suggestion_id)}" data-open-suggestion-evaluation="${escapeHtml(payload.evaluation_id)}">打开建议</button>`);
      }
      return buttons.join("");
    }

    function renderDetail() {
      const contextDrilldown = state.contextDrilldown;
      if (contextDrilldown) {
        renderContextDetail(contextDrilldown);
        return;
      }

      const item = currentEvent();
      if (!item) {
        el.auditDetail.innerHTML = '<div class="empty">请选择左侧审计事件查看详情。</div>';
        return;
      }

      const payload = {
        task_id: item.task_id || item.payload?.task_id || "",
        capability_id: item.capability_id || item.payload?.capability_id || "",
        workflow: item.workflow || item.payload?.workflow || "",
        ticket_id: item.ticket_id || item.payload?.ticket_id || "",
        suggestion_id: item.suggestion_id || item.payload?.suggestion_id || "",
        evaluation_id: item.evaluation_id || item.payload?.evaluation_id || "",
      };

      const tags = [
        payload.task_id ? ["task", payload.task_id] : null,
        payload.capability_id ? ["capability", payload.capability_id] : null,
        payload.workflow ? ["workflow", payload.workflow] : null,
        payload.ticket_id ? ["ticket", payload.ticket_id] : null,
        payload.suggestion_id ? ["suggestion", payload.suggestion_id] : null,
        payload.evaluation_id ? ["evaluation", payload.evaluation_id] : null,
      ].filter(Boolean);

      el.auditDetail.innerHTML = `
        <div class="hero">
          <div class="title">${escapeHtml(item.action)}</div>
          <div class="subtle" style="margin-top: 8px;">actor_id：${escapeHtml(item.actor_id)}</div>
          <div class="subtle">source / event_type：${escapeHtml(item.source || "-")} / ${escapeHtml(item.event_type || "-")}</div>
          <div class="subtle">outcome：${escapeHtml(item.outcome ?? "-")} / 时间：${escapeHtml(item.created_at)}</div>
          <div class="chip-row">
            ${tags.map(tag => `<span class="chip">${escapeHtml(tag[0])}:${escapeHtml(tag[1])}</span>`).join("") || '<span class="chip success">no-linked-context</span>'}
          </div>
        </div>
        <div class="detail-list">
          <div class="detail-row"><div class="label">source</div><div class="value">${escapeHtml(item.source || "-")}</div></div>
          <div class="detail-row"><div class="label">event_type</div><div class="value">${escapeHtml(item.event_type || "-")}</div></div>
          <div class="detail-row"><div class="label">outcome</div><div class="value">${escapeHtml(item.outcome ?? "-")}</div></div>
          <div class="detail-row"><div class="label">task_id</div><div class="value">${escapeHtml(payload.task_id || "-")}</div></div>
          <div class="detail-row"><div class="label">capability_id</div><div class="value">${escapeHtml(payload.capability_id || "-")}</div></div>
          <div class="detail-row"><div class="label">workflow</div><div class="value">${escapeHtml(payload.workflow || "-")}</div></div>
          <div class="detail-row"><div class="label">ticket_id</div><div class="value">${escapeHtml(payload.ticket_id || "-")}</div></div>
          <div class="detail-row"><div class="label">suggestion_id</div><div class="value">${escapeHtml(payload.suggestion_id || "-")}</div></div>
          <div class="detail-row"><div class="label">evaluation_id</div><div class="value">${escapeHtml(payload.evaluation_id || "-")}</div></div>
        </div>
        <div class="button-row">${buildOpenButtons(payload)}</div>
        <h2 style="margin-top: 18px;">原始载荷</h2>
        <pre class="payload">${escapeHtml(JSON.stringify(item.payload || {}, null, 2))}</pre>
      `;

      bindDetailButtons();
    }

    function renderContextDetail(contextDrilldown) {
      const target = contextDrilldown.target || {};
      const events = contextDrilldown.events || [];
      const latestEvent = events[0] || null;
      const payload = latestEvent?.payload || {};
      el.auditDetail.innerHTML = `
        <div class="hero">
          <div class="title">${escapeHtml(target.title || contextDrilldown.context_type)} / ${escapeHtml(contextDrilldown.context_id)}</div>
          <div class="subtle" style="margin-top: 8px;">事件数：${escapeHtml(contextDrilldown.event_count)}</div>
          <div class="subtle">最近事件：${escapeHtml(contextDrilldown.latest_action || "-")} / ${escapeHtml(contextDrilldown.latest_actor_id || "-")}</div>
          <div class="subtle">最近时间：${escapeHtml(contextDrilldown.latest_created_at || "-")}</div>
          <div class="chip-row">
            ${(contextDrilldown.actions || []).map(item => `<span class="chip">${escapeHtml(item)}</span>`).join("") || '<span class="chip success">no-actions</span>'}
          </div>
        </div>
        <div class="detail-list">
          <div class="detail-row"><div class="label">context_type</div><div class="value">${escapeHtml(contextDrilldown.context_type)}</div></div>
          <div class="detail-row"><div class="label">context_id</div><div class="value">${escapeHtml(contextDrilldown.context_id)}</div></div>
          <div class="detail-row"><div class="label">target_ui</div><div class="value">${escapeHtml(target.target_ui || "-")}</div></div>
          <div class="detail-row"><div class="label">target_api</div><div class="value">${escapeHtml(target.target_api || "-")}</div></div>
          <div class="detail-row"><div class="label">latest_task</div><div class="value">${escapeHtml(payload.task_id || latestEvent?.task_id || "-")}</div></div>
          <div class="detail-row"><div class="label">latest_capability</div><div class="value">${escapeHtml(payload.capability_id || latestEvent?.capability_id || "-")}</div></div>
          <div class="detail-row"><div class="label">latest_workflow</div><div class="value">${escapeHtml(payload.workflow || latestEvent?.workflow || "-")}</div></div>
          <div class="detail-row"><div class="label">latest_ticket</div><div class="value">${escapeHtml(payload.ticket_id || latestEvent?.ticket_id || "-")}</div></div>
          <div class="detail-row"><div class="label">latest_evaluation</div><div class="value">${escapeHtml(payload.evaluation_id || latestEvent?.evaluation_id || "-")}</div></div>
          <div class="detail-row"><div class="label">latest_suggestion</div><div class="value">${escapeHtml(payload.suggestion_id || latestEvent?.suggestion_id || "-")}</div></div>
        </div>
        <div class="button-row">
          ${target.target_ui ? `<button class="primary" type="button" data-open-context-ui="${escapeHtml(target.target_ui)}">打开业务页面</button>` : ""}
          ${target.target_api ? `<button type="button" data-open-context-api="${escapeHtml(target.target_api)}">查看 API 目标</button>` : ""}
          <button type="button" data-apply-context-filter="${escapeHtml(contextDrilldown.context_type)}" data-apply-context-id="${escapeHtml(contextDrilldown.context_id)}">应用为筛选条件</button>
          <button type="button" data-close-context-drilldown="true">返回事件详情</button>
        </div>
        <h2 style="margin-top: 18px;">上下文事件</h2>
        <div class="list">
          ${events.map(item => `
            <div class="card">
              <div class="title">${escapeHtml(item.action)}</div>
              <div class="subtle">${escapeHtml(item.actor_id)} / ${escapeHtml(item.source || "-")} / ${escapeHtml(item.event_type || "-")}</div>
              <div class="subtle">outcome=${escapeHtml(item.outcome ?? "-")} / ${escapeHtml(item.created_at)}</div>
            </div>
          `).join("") || '<div class="empty">当前上下文暂无事件。</div>'}
        </div>
      `;
      bindContextDrilldownButtons();
    }

    function bindDetailButtons() {
      const openTaskBtn = el.auditDetail.querySelector("[data-open-task]");
      const openWorkflowBtn = el.auditDetail.querySelector("[data-open-workflow]");
      const openCapabilityBtn = el.auditDetail.querySelector("[data-open-capability]");
      const openTicketBtn = el.auditDetail.querySelector("[data-open-ticket]");
      const openEvaluationBtn = el.auditDetail.querySelector("[data-open-evaluation]");
      const openSuggestionBtn = el.auditDetail.querySelector("[data-open-suggestion]");

      if (openTaskBtn) {
        openTaskBtn.addEventListener("click", () => {
          const taskId = openTaskBtn.getAttribute("data-open-task") || "";
          window.location.href = `/ui/tasks?task_id=${encodeURIComponent(taskId)}`;
        });
      }
      if (openWorkflowBtn) {
        openWorkflowBtn.addEventListener("click", () => {
          const workflowCode = openWorkflowBtn.getAttribute("data-open-workflow") || "";
          window.location.href = `/ui/workflows?workflow_code=${encodeURIComponent(workflowCode)}`;
        });
      }
      if (openCapabilityBtn) {
        openCapabilityBtn.addEventListener("click", () => {
          const capabilityId = openCapabilityBtn.getAttribute("data-open-capability") || "";
          window.location.href = `/ui/capabilities?capability_id=${encodeURIComponent(capabilityId)}`;
        });
      }
      if (openTicketBtn) {
        openTicketBtn.addEventListener("click", () => {
          const ticketId = openTicketBtn.getAttribute("data-open-ticket") || "";
          window.location.href = `/ui/service-tickets?ticket_id=${encodeURIComponent(ticketId)}`;
        });
      }
      if (openEvaluationBtn) {
        openEvaluationBtn.addEventListener("click", () => {
          const evaluationId = openEvaluationBtn.getAttribute("data-open-evaluation") || "";
          window.location.href = `/ui/evaluations?evaluation_id=${encodeURIComponent(evaluationId)}`;
        });
      }
      if (openSuggestionBtn) {
        openSuggestionBtn.addEventListener("click", () => {
          const suggestionId = openSuggestionBtn.getAttribute("data-open-suggestion") || "";
          const evaluationId = openSuggestionBtn.getAttribute("data-open-suggestion-evaluation") || "";
          window.location.href = `/ui/evaluations?evaluation_id=${encodeURIComponent(evaluationId)}&suggestion_id=${encodeURIComponent(suggestionId)}`;
        });
      }
    }

    function bindContextDrilldownButtons() {
      const openContextUiBtn = el.auditDetail.querySelector("[data-open-context-ui]");
      const openContextApiBtn = el.auditDetail.querySelector("[data-open-context-api]");
      const applyFilterBtn = el.auditDetail.querySelector("[data-apply-context-filter]");
      const closeBtn = el.auditDetail.querySelector("[data-close-context-drilldown]");

      if (openContextUiBtn) {
        openContextUiBtn.addEventListener("click", () => {
          const target = openContextUiBtn.getAttribute("data-open-context-ui") || "";
          if (target) {
            window.location.href = target;
          }
        });
      }
      if (openContextApiBtn) {
        openContextApiBtn.addEventListener("click", () => {
          const target = openContextApiBtn.getAttribute("data-open-context-api") || "";
          if (target) {
            window.open(target, "_blank", "noopener");
          }
        });
      }
      if (applyFilterBtn) {
        applyFilterBtn.addEventListener("click", async () => {
          const contextType = applyFilterBtn.getAttribute("data-apply-context-filter") || "";
          const contextId = applyFilterBtn.getAttribute("data-apply-context-id") || "";
          applyContextFilter(contextType, contextId);
          state.contextDrilldown = null;
          await loadAudit();
        });
      }
      if (closeBtn) {
        closeBtn.addEventListener("click", () => {
          state.contextDrilldown = null;
          renderDetail();
        });
      }
    }

    function applyContextFilter(contextType, contextId) {
      const mapping = {
        task: el.taskFilterInput,
        approval: null,
        capability: el.capabilityFilterInput,
        workflow: el.workflowFilterInput,
        ticket: el.ticketFilterInput,
        suggestion: el.suggestionFilterInput,
        evaluation: el.evaluationFilterInput,
      };
      const input = mapping[contextType];
      if (!input) return;
      input.value = contextId;
    }

    async function loadContextDrilldown(contextType, contextId) {
      state.contextDrilldown = await fetchJson(
        `/api/audit/context/${encodeURIComponent(contextType)}/${encodeURIComponent(contextId)}`
      );
      renderDetail();
    }

    async function loadAudit() {
      const query = buildQuery();
      const queryString = query.toString();
      const [overview, events, linkedContext] = await Promise.all([
        fetchJson("/api/audit/overview"),
        fetchJson(`/api/audit${queryString ? `?${queryString}` : ""}`),
        fetchJson(`/api/audit/linked-context${queryString ? `?${queryString}` : ""}`),
      ]);
      renderOverview(overview);
      state.events = events;
      state.linkedContext = linkedContext;
      state.contextDrilldown = null;
      state.selectedIndex = 0;
      renderLinkedContext();
      renderList();
      renderDetail();
      syncQuery();
    }

    async function bootstrap() {
      fillFiltersFromQuery();
      await loadAudit();
    }

    function openTaskPage() {
      const taskId = el.taskFilterInput.value.trim() || currentPayload().task_id || "";
      window.location.href = taskId ? `/ui/tasks?task_id=${encodeURIComponent(taskId)}` : "/ui/tasks";
    }

    function openWorkflowPage() {
      const workflowCode = el.workflowFilterInput.value.trim() || currentPayload().workflow || "";
      window.location.href = workflowCode
        ? `/ui/workflows?workflow_code=${encodeURIComponent(workflowCode)}`
        : "/ui/workflows";
    }

    function openCapabilityPage() {
      const capabilityId = el.capabilityFilterInput.value.trim() || currentPayload().capability_id || "";
      window.location.href = capabilityId
        ? `/ui/capabilities?capability_id=${encodeURIComponent(capabilityId)}`
        : "/ui/capabilities";
    }

    el.taskPageBtn.addEventListener("click", openTaskPage);
    el.mcpPageBtn.addEventListener("click", () => {
      window.location.href = "/ui/mcp";
    });
    el.workflowPageBtn.addEventListener("click", openWorkflowPage);
    el.capabilityPageBtn.addEventListener("click", openCapabilityPage);
    el.loadBtn.addEventListener("click", loadAudit);

    [
      el.actionFilterInput,
      el.actorFilterInput,
      el.sourceFilterInput,
      el.eventTypeFilterInput,
      el.outcomeFilterInput,
      el.taskFilterInput,
      el.capabilityFilterInput,
      el.workflowFilterInput,
      el.ticketFilterInput,
      el.suggestionFilterInput,
      el.evaluationFilterInput,
    ].forEach(node => {
      node.addEventListener("keydown", async event => {
        if (event.key === "Enter") await loadAudit();
      });
    });

    bootstrap();
  </script>
</body>
</html>
