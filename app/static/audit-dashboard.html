<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>审计中心</title>
  <style>
    :root {
      --bg: #f5efe7;
      --panel: #fffdf9;
      --line: #e4d6c5;
      --text: #241b15;
      --muted: #726657;
      --accent: #a15428;
      --radius: 18px;
      --shadow: 0 16px 38px rgba(73, 42, 19, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
    }
    .page {
      max-width: 1450px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 30px;
    }
    .header p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 860px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar button,
    .toolbar input {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 10px 14px;
      color: var(--text);
      font: inherit;
    }
    .toolbar button {
      background: var(--accent);
      border: 0;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    .toolbar button.secondary {
      background: #eadcc9;
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      gap: 20px;
    }
    .panel {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .list,
    .detail-list {
      display: grid;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid #eadcca;
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 10px;
      cursor: pointer;
    }
    .card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(161, 84, 40, 0.14);
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
    }
    .subtle,
    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .hero {
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff6ec 0%, #fffdf9 100%);
      border: 1px solid #eadcca;
      margin-bottom: 14px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(230, 215, 196, 0.95);
      padding-bottom: 8px;
      font-size: 14px;
    }
    .detail-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .label {
      color: var(--muted);
      flex: 0 0 140px;
    }
    .value {
      flex: 1;
      text-align: right;
      word-break: break-word;
    }
    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f2e4d5;
      color: #6d563f;
    }
    pre.payload {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #fbf6ef;
      border-radius: 14px;
      padding: 12px;
      font-size: 12px;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>审计中心</h1>
        <p>集中查看平台审计事件，支持按操作类型、操作者、任务和审批单过滤，并可直接跳转到任务、审批、能力和流程中心做联调排查。</p>
      </div>
      <div class="toolbar">
        <button id="taskPageBtn" class="secondary">任务面板</button>
        <button id="approvalPageBtn" class="secondary">审批中心</button>
        <button id="workflowPageBtn" class="secondary">Workflow Center</button>
        <button id="capabilityPageBtn" class="secondary">Capability Center</button>
        <input id="actionFilterInput" placeholder="按 action 过滤" />
        <input id="actorFilterInput" placeholder="按 actor_id 过滤" />
        <input id="taskFilterInput" placeholder="按 task_id 过滤" />
        <input id="approvalFilterInput" placeholder="按 approval_id 过滤" />
        <input id="capabilityFilterInput" placeholder="按 capability_id 过滤" />
        <input id="workflowFilterInput" placeholder="按 workflow 过滤" />
        <button id="loadBtn">加载审计</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>审计事件列表</h2>
        <div id="auditMeta" class="subtle">正在加载审计事件...</div>
        <div id="auditList" class="list" style="margin-top: 12px;">
          <div class="empty">正在加载审计事件...</div>
        </div>
      </section>

      <section class="panel">
        <h2>审计详情</h2>
        <div id="auditDetail">
          <div class="empty">请选择左侧审计事件查看详情。</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      events: [],
      selectedIndex: 0,
    };

    const el = {
      taskPageBtn: document.getElementById("taskPageBtn"),
      approvalPageBtn: document.getElementById("approvalPageBtn"),
      workflowPageBtn: document.getElementById("workflowPageBtn"),
      capabilityPageBtn: document.getElementById("capabilityPageBtn"),
      actionFilterInput: document.getElementById("actionFilterInput"),
      actorFilterInput: document.getElementById("actorFilterInput"),
      taskFilterInput: document.getElementById("taskFilterInput"),
      approvalFilterInput: document.getElementById("approvalFilterInput"),
      capabilityFilterInput: document.getElementById("capabilityFilterInput"),
      workflowFilterInput: document.getElementById("workflowFilterInput"),
      loadBtn: document.getElementById("loadBtn"),
      auditMeta: document.getElementById("auditMeta"),
      auditList: document.getElementById("auditList"),
      auditDetail: document.getElementById("auditDetail"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      const text = await response.text();
      const body = text ? JSON.parse(text) : [];
      if (!response.ok) throw new Error(body?.detail || `HTTP ${response.status}`);
      return body;
    }

    function currentEvent() {
      return state.events[state.selectedIndex] || null;
    }

    function currentPayload() {
      return currentEvent()?.payload || {};
    }

    function syncQuery() {
      const url = new URL(window.location.href);
      const pairs = {
        action: el.actionFilterInput.value.trim(),
        actor_id: el.actorFilterInput.value.trim(),
        task_id: el.taskFilterInput.value.trim(),
        approval_id: el.approvalFilterInput.value.trim(),
        capability_id: el.capabilityFilterInput.value.trim(),
        workflow: el.workflowFilterInput.value.trim(),
      };
      Object.entries(pairs).forEach(([key, value]) => {
        if (value) {
          url.searchParams.set(key, value);
        } else {
          url.searchParams.delete(key);
        }
      });
      window.history.replaceState({}, "", url);
    }

    function buildQuery() {
      const query = new URLSearchParams();
      if (el.actionFilterInput.value.trim()) query.set("action", el.actionFilterInput.value.trim());
      if (el.actorFilterInput.value.trim()) query.set("actor_id", el.actorFilterInput.value.trim());
      if (el.taskFilterInput.value.trim()) query.set("task_id", el.taskFilterInput.value.trim());
      if (el.approvalFilterInput.value.trim()) query.set("approval_id", el.approvalFilterInput.value.trim());
      if (el.capabilityFilterInput.value.trim()) query.set("capability_id", el.capabilityFilterInput.value.trim());
      if (el.workflowFilterInput.value.trim()) query.set("workflow", el.workflowFilterInput.value.trim());
      return query;
    }

    function renderList() {
      el.auditMeta.textContent = `当前共 ${state.events.length} 条审计事件`;
      if (!state.events.length) {
        el.auditList.innerHTML = '<div class="empty">当前筛选条件下没有审计事件。</div>';
        el.auditDetail.innerHTML = '<div class="empty">请选择左侧审计事件查看详情。</div>';
        return;
      }
      el.auditList.innerHTML = state.events.map((item, index) => {
        const payload = item.payload || {};
        return `
          <div class="card ${index === state.selectedIndex ? "active" : ""}" data-index="${index}">
            <div class="title">${escapeHtml(item.action)}</div>
            <div class="subtle">actor_id：${escapeHtml(item.actor_id)}</div>
            <div class="subtle">时间：${escapeHtml(item.created_at)}</div>
            <div class="subtle">task_id：${escapeHtml(payload.task_id || "-")}</div>
            <div class="subtle">approval_id：${escapeHtml(payload.approval_id || "-")}</div>
          </div>
        `;
      }).join("");

      el.auditList.querySelectorAll("[data-index]").forEach(node => {
        node.addEventListener("click", () => {
          state.selectedIndex = Number(node.getAttribute("data-index") || "0");
          renderList();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const item = currentEvent();
      if (!item) {
        el.auditDetail.innerHTML = '<div class="empty">请选择左侧审计事件查看详情。</div>';
        return;
      }
      const payload = item.payload || {};
      const taskId = payload.task_id || "";
      const approvalId = payload.approval_id || "";
      const capabilityId = payload.capability_id || "";
      const workflowCode = payload.workflow || "";

      el.auditDetail.innerHTML = `
        <div class="hero">
          <div class="title">${escapeHtml(item.action)}</div>
          <div class="subtle" style="margin-top: 8px;">actor_id：${escapeHtml(item.actor_id)}</div>
          <div class="subtle">时间：${escapeHtml(item.created_at)}</div>
          <div class="chip-row">
            ${taskId ? `<span class="chip">task:${escapeHtml(taskId)}</span>` : ""}
            ${approvalId ? `<span class="chip">approval:${escapeHtml(approvalId)}</span>` : ""}
            ${capabilityId ? `<span class="chip">capability:${escapeHtml(capabilityId)}</span>` : ""}
            ${workflowCode ? `<span class="chip">workflow:${escapeHtml(workflowCode)}</span>` : ""}
          </div>
        </div>
        <div class="detail-list">
          <div class="detail-row"><div class="label">task_id</div><div class="value">${escapeHtml(taskId || "-")}</div></div>
          <div class="detail-row"><div class="label">approval_id</div><div class="value">${escapeHtml(approvalId || "-")}</div></div>
          <div class="detail-row"><div class="label">capability_id</div><div class="value">${escapeHtml(capabilityId || "-")}</div></div>
          <div class="detail-row"><div class="label">workflow</div><div class="value">${escapeHtml(workflowCode || "-")}</div></div>
        </div>
        <div class="toolbar" style="justify-content: flex-start; margin-top: 16px;">
          ${taskId ? '<button id="openTaskBtn" class="secondary">打开任务</button>' : ""}
          ${approvalId ? '<button id="openApprovalBtn" class="secondary">打开审批</button>' : ""}
          ${workflowCode ? '<button id="openWorkflowBtn" class="secondary">打开 Workflow</button>' : ""}
          ${capabilityId ? '<button id="openCapabilityBtn" class="secondary">打开 Capability</button>' : ""}
        </div>
        <h2 style="margin-top: 18px;">原始载荷</h2>
        <pre class="payload">${escapeHtml(JSON.stringify(payload, null, 2))}</pre>
      `;

      const openTaskBtn = document.getElementById("openTaskBtn");
      const openApprovalBtn = document.getElementById("openApprovalBtn");
      const openWorkflowBtn = document.getElementById("openWorkflowBtn");
      const openCapabilityBtn = document.getElementById("openCapabilityBtn");

      if (openTaskBtn && taskId) {
        openTaskBtn.addEventListener("click", () => {
          window.location.href = `/ui/tasks?task_id=${encodeURIComponent(taskId)}`;
        });
      }
      if (openApprovalBtn && approvalId) {
        openApprovalBtn.addEventListener("click", () => {
          window.location.href = `/ui/approvals?approval_id=${encodeURIComponent(approvalId)}`;
        });
      }
      if (openWorkflowBtn && workflowCode) {
        openWorkflowBtn.addEventListener("click", () => {
          window.location.href = `/ui/workflows?workflow_code=${encodeURIComponent(workflowCode)}`;
        });
      }
      if (openCapabilityBtn && capabilityId) {
        openCapabilityBtn.addEventListener("click", () => {
          window.location.href = `/ui/capabilities?capability_id=${encodeURIComponent(capabilityId)}`;
        });
      }
    }

    async function loadAudit() {
      const query = buildQuery();
      state.events = await fetchJson(`/api/audit?${query.toString()}`);
      state.selectedIndex = 0;
      renderList();
      renderDetail();
      syncQuery();
    }

    async function bootstrap() {
      const query = new URLSearchParams(window.location.search);
      el.actionFilterInput.value = query.get("action") || "";
      el.actorFilterInput.value = query.get("actor_id") || "";
      el.taskFilterInput.value = query.get("task_id") || "";
      el.approvalFilterInput.value = query.get("approval_id") || "";
      el.capabilityFilterInput.value = query.get("capability_id") || "";
      el.workflowFilterInput.value = query.get("workflow") || "";
      await loadAudit();
    }

    const ticketFilterInput = document.createElement("input");
    ticketFilterInput.id = "ticketFilterInput";
    ticketFilterInput.placeholder = "按 ticket_id 过滤";
    el.workflowFilterInput.insertAdjacentElement("afterend", ticketFilterInput);

    const suggestionFilterInput = document.createElement("input");
    suggestionFilterInput.id = "suggestionFilterInput";
    suggestionFilterInput.placeholder = "按 suggestion_id 过滤";
    ticketFilterInput.insertAdjacentElement("afterend", suggestionFilterInput);

    const evaluationFilterInput = document.createElement("input");
    evaluationFilterInput.id = "evaluationFilterInput";
    evaluationFilterInput.placeholder = "按 evaluation_id 过滤";
    suggestionFilterInput.insertAdjacentElement("afterend", evaluationFilterInput);

    const originalBuildQuery = buildQuery;
    buildQuery = function buildAuditQueryExtended() {
      const query = originalBuildQuery();
      if (ticketFilterInput.value.trim()) query.set("ticket_id", ticketFilterInput.value.trim());
      if (suggestionFilterInput.value.trim()) query.set("suggestion_id", suggestionFilterInput.value.trim());
      if (evaluationFilterInput.value.trim()) query.set("evaluation_id", evaluationFilterInput.value.trim());
      return query;
    };

    const originalSyncQuery = syncQuery;
    syncQuery = function syncAuditQueryExtended() {
      originalSyncQuery();
      const url = new URL(window.location.href);
      const extraPairs = {
        ticket_id: ticketFilterInput.value.trim(),
        suggestion_id: suggestionFilterInput.value.trim(),
        evaluation_id: evaluationFilterInput.value.trim(),
      };
      Object.entries(extraPairs).forEach(([key, value]) => {
        if (value) {
          url.searchParams.set(key, value);
        } else {
          url.searchParams.delete(key);
        }
      });
      window.history.replaceState({}, "", url);
    };

    const originalRenderDetail = renderDetail;
    renderDetail = function renderAuditDetailExtended() {
      originalRenderDetail();
      const item = currentEvent();
      if (!item) {
        return;
      }
      const payload = item.payload || {};
      const ticketId = payload.ticket_id || item.ticket_id || "";
      const suggestionId = payload.suggestion_id || item.suggestion_id || "";
      const evaluationId = payload.evaluation_id || item.evaluation_id || "";
      const toolbar = el.auditDetail.querySelector(".toolbar");
      if (!toolbar) {
        return;
      }
      if (ticketId && !document.getElementById("openTicketBtn")) {
        const ticketBtn = document.createElement("button");
        ticketBtn.id = "openTicketBtn";
        ticketBtn.type = "button";
        ticketBtn.className = "secondary";
        ticketBtn.textContent = "打开工单";
        ticketBtn.addEventListener("click", () => {
          window.location.href = `/ui/service-tickets?ticket_id=${encodeURIComponent(ticketId)}`;
        });
        toolbar.appendChild(ticketBtn);
      }
      if (suggestionId && evaluationId && !document.getElementById("openSuggestionBtn")) {
        const suggestionBtn = document.createElement("button");
        suggestionBtn.id = "openSuggestionBtn";
        suggestionBtn.type = "button";
        suggestionBtn.className = "secondary";
        suggestionBtn.textContent = "打开建议";
        suggestionBtn.addEventListener("click", () => {
          window.location.href = `/ui/evaluations?evaluation_id=${encodeURIComponent(evaluationId)}&suggestion_id=${encodeURIComponent(suggestionId)}`;
        });
        toolbar.appendChild(suggestionBtn);
      }
    };

    const originalBootstrap = bootstrap;
    bootstrap = async function bootstrapAuditExtended() {
      const query = new URLSearchParams(window.location.search);
      ticketFilterInput.value = query.get("ticket_id") || "";
      suggestionFilterInput.value = query.get("suggestion_id") || "";
      evaluationFilterInput.value = query.get("evaluation_id") || "";
      await originalBootstrap();
    };

    el.taskPageBtn.addEventListener("click", () => {
      const taskId = el.taskFilterInput.value.trim() || currentPayload().task_id || "";
      const target = taskId ? `/ui/tasks?task_id=${encodeURIComponent(taskId)}` : "/ui/tasks";
      window.location.href = target;
    });
    el.approvalPageBtn.addEventListener("click", () => {
      const approvalId = el.approvalFilterInput.value.trim() || currentPayload().approval_id || "";
      const target = approvalId ? `/ui/approvals?approval_id=${encodeURIComponent(approvalId)}` : "/ui/approvals";
      window.location.href = target;
    });
    el.workflowPageBtn.addEventListener("click", () => {
      const workflowCode = currentPayload().workflow || "";
      const target = workflowCode ? `/ui/workflows?workflow_code=${encodeURIComponent(workflowCode)}` : "/ui/workflows";
      window.location.href = target;
    });
    el.capabilityPageBtn.addEventListener("click", () => {
      const capabilityId = currentPayload().capability_id || "";
      const target = capabilityId ? `/ui/capabilities?capability_id=${encodeURIComponent(capabilityId)}` : "/ui/capabilities";
      window.location.href = target;
    });
    el.loadBtn.addEventListener("click", loadAudit);
    [el.actionFilterInput, el.actorFilterInput, el.taskFilterInput, el.approvalFilterInput, el.capabilityFilterInput, el.workflowFilterInput].forEach(node => {
      node.addEventListener("keydown", async event => {
        if (event.key === "Enter") await loadAudit();
      });
    });
    [ticketFilterInput, suggestionFilterInput, evaluationFilterInput].forEach(node => {
      node.addEventListener("keydown", async event => {
        if (event.key === "Enter") await loadAudit();
      });
    });

    bootstrap();
  </script>
</body>
</html>
