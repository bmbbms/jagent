<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capability Center</title>
  <style>
    :root {
      --bg: #f5efe7;
      --panel: #fffdf9;
      --line: #e4d6c5;
      --text: #241b15;
      --muted: #726657;
      --accent: #a15428;
      --success: #1f7a4d;
      --warning: #a8741d;
      --radius: 18px;
      --shadow: 0 16px 38px rgba(73, 42, 19, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
    }
    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 30px;
    }
    .header p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 860px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar button,
    .toolbar input,
    .toolbar select {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 10px 14px;
      color: var(--text);
      font: inherit;
    }
    .toolbar button {
      background: var(--accent);
      border: 0;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    .toolbar button.secondary {
      background: #eadcc9;
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      gap: 20px;
    }
    .panel {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .list,
    .stack,
    .detail-grid {
      display: grid;
      gap: 10px;
    }
    .capability-card,
    .detail-card {
      background: var(--panel);
      border: 1px solid #eadcca;
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .capability-card {
      cursor: pointer;
    }
    .capability-card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(161, 84, 40, 0.14);
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
    }
    .subtle,
    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f2e4d5;
      color: #6d563f;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .tag.success {
      background: rgba(31, 122, 77, 0.12);
      color: var(--success);
    }
    .tag.warning {
      background: rgba(168, 116, 29, 0.14);
      color: var(--warning);
    }
    .hero {
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff6ec 0%, #fffdf9 100%);
      border: 1px solid #eadcca;
    }
    .hero strong {
      display: block;
      margin-top: 8px;
      font-size: 30px;
      color: var(--accent);
      line-height: 1;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(230, 215, 196, 0.95);
      padding-bottom: 8px;
      font-size: 14px;
    }
    .detail-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .label {
      color: var(--muted);
      flex: 0 0 150px;
    }
    .value {
      flex: 1;
      text-align: right;
      word-break: break-word;
    }
    .section-split {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid #eadcca;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>Capability Center</h1>
        <p>集中查看主 Agent 当前可路由的全部业务能力，包括本地能力与外部注册能力，并支持按来源、风险、审批要求和传输方式做运营筛选。</p>
      </div>
      <div class="toolbar">
        <button id="taskPageBtn" class="secondary">任务面板</button>
        <button id="agentPageBtn" class="secondary">外部 Agent</button>
        <button id="workflowPageBtn" class="secondary">Workflow 中心</button>
        <button id="skillPageBtn" class="secondary">Skill 中心</button>
        <select id="domainFilter">
          <option value="">全部业务域</option>
          <option value="merchant">merchant</option>
          <option value="operations">operations</option>
          <option value="data_support">data_support</option>
          <option value="partner">partner</option>
        </select>
        <select id="sourceFilter">
          <option value="">全部来源</option>
          <option value="local">local</option>
          <option value="external">external</option>
          <option value="manual_remote">manual_remote</option>
          <option value="generic_add">generic_add</option>
          <option value="nacos">nacos</option>
        </select>
        <select id="riskFilter">
          <option value="">全部 risk</option>
          <option value="low">low</option>
          <option value="medium">medium</option>
          <option value="high">high</option>
        </select>
        <select id="approvalFilter">
          <option value="">全部 approval</option>
          <option value="true">requires_approval=true</option>
          <option value="false">requires_approval=false</option>
        </select>
        <select id="transportFilter">
          <option value="">全部 transport</option>
          <option value="inproc">inproc</option>
          <option value="http">http</option>
          <option value="a2a">a2a</option>
        </select>
        <select id="healthFilter">
          <option value="">全部 health</option>
          <option value="healthy">healthy</option>
          <option value="unhealthy">unhealthy</option>
          <option value="unknown">unknown</option>
        </select>
        <input id="skillFilterInput" placeholder="按 skill_id 反查 capability" />
        <input id="capabilityIdInput" placeholder="输入 capability_id 直接打开" />
        <button id="loadBtn">加载能力</button>
        <button id="refreshBtn" class="secondary">刷新列表</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Capability 治理概览</h2>
        <div id="capabilityOverview" class="detail-card">
          <div class="empty">正在加载 Capability 治理概览...</div>
        </div>
      </section>

      <section class="panel">
        <h2>Capability 列表</h2>
        <div id="capabilityListMeta" class="subtle">正在加载 Capability 列表...</div>
        <div id="capabilityList" class="list" style="margin-top: 12px;">
          <div class="empty">正在加载 Capability 列表...</div>
        </div>
      </section>

      <section class="panel">
        <h2>Capability 详情</h2>
        <div id="capabilityDetail">
          <div class="empty">请选择左侧 Capability 查看详情。</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      capabilities: [],
      externalAgents: [],
      capabilityId: "",
      selectedCapability: null,
      recentTasks: [],
    };

    const el = {
      taskPageBtn: document.getElementById("taskPageBtn"),
      agentPageBtn: document.getElementById("agentPageBtn"),
      workflowPageBtn: document.getElementById("workflowPageBtn"),
      skillPageBtn: document.getElementById("skillPageBtn"),
      domainFilter: document.getElementById("domainFilter"),
      sourceFilter: document.getElementById("sourceFilter"),
      riskFilter: document.getElementById("riskFilter"),
      approvalFilter: document.getElementById("approvalFilter"),
      transportFilter: document.getElementById("transportFilter"),
      healthFilter: document.getElementById("healthFilter"),
      skillFilterInput: document.getElementById("skillFilterInput"),
      capabilityIdInput: document.getElementById("capabilityIdInput"),
      loadBtn: document.getElementById("loadBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      capabilityOverview: document.getElementById("capabilityOverview"),
      capabilityListMeta: document.getElementById("capabilityListMeta"),
      capabilityList: document.getElementById("capabilityList"),
      capabilityDetail: document.getElementById("capabilityDetail"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      const text = await response.text();
      const body = text ? JSON.parse(text) : null;
      if (!response.ok) {
        throw new Error(body?.detail || `HTTP ${response.status}`);
      }
      return body;
    }

    function updateQuery() {
      const url = new URL(window.location.href);
      const pairs = {
        capability_id: state.capabilityId,
        biz_domain: el.domainFilter.value,
        source: el.sourceFilter.value,
        risk_level: el.riskFilter.value,
        requires_approval: el.approvalFilter.value,
        transport: el.transportFilter.value,
        health_status: el.healthFilter.value,
        skill_id: el.skillFilterInput.value.trim(),
      };
      Object.entries(pairs).forEach(([key, value]) => {
        if (value) {
          url.searchParams.set(key, value);
        } else {
          url.searchParams.delete(key);
        }
      });
      window.history.replaceState({}, "", url);
    }

    function renderTagList(items, tone = "") {
      if (!items.length) {
        return '<div class="empty">暂无</div>';
      }
      return `<div class="chips">${items.map(item => `<span class="tag ${tone}">${escapeHtml(item)}</span>`).join("")}</div>`;
    }

    function renderOverview(overview) {
      if (!overview) {
        el.capabilityOverview.innerHTML = '<div class="empty">暂无 Capability 治理概览。</div>';
        return;
      }
      el.capabilityOverview.innerHTML = `
        <div class="detail-grid">
          <div class="detail-row"><div class="label">Capability 总数</div><div class="value">${escapeHtml(overview.total)}</div></div>
          <div class="detail-row"><div class="label">本地 / 外部</div><div class="value">${escapeHtml(overview.local_count)} / ${escapeHtml(overview.external_count)}</div></div>
          <div class="detail-row"><div class="label">高风险 / 需审批</div><div class="value">${escapeHtml(overview.high_risk_count)} / ${escapeHtml(overview.approval_required_count)}</div></div>
          <div class="detail-row"><div class="label">健康 / 异常 / 未知</div><div class="value">${escapeHtml(overview.healthy_count)} / ${escapeHtml(overview.unhealthy_count)} / ${escapeHtml(overview.unknown_health_count)}</div></div>
          <div class="detail-row"><div class="label">业务域分布</div><div class="value">${escapeHtml(Object.entries(overview.domain_counts || {}).map(([key, value]) => `${key}:${value}`).join(", ") || "-")}</div></div>
          <div class="detail-row"><div class="label">来源分布</div><div class="value">${escapeHtml(Object.entries(overview.source_counts || {}).map(([key, value]) => `${key}:${value}`).join(", ") || "-")}</div></div>
          <div class="detail-row"><div class="label">Transport 分布</div><div class="value">${escapeHtml(Object.entries(overview.transport_counts || {}).map(([key, value]) => `${key}:${value}`).join(", ") || "-")}</div></div>
        </div>
      `;
    }

    function getExternalMetadata(capabilityId) {
      return state.externalAgents.find(item => item.capability_id === capabilityId) || null;
    }

    function getCapabilitySource(capabilityId) {
      const capability = state.capabilities.find(item => item.capability_id === capabilityId);
      if (capability?.source) {
        return capability.source;
      }
      return getExternalMetadata(capabilityId) ? "external" : "local";
    }

    function renderCapabilityList() {
      el.capabilityListMeta.textContent = `当前共 ${state.capabilities.length} 个 Capability`;
      if (!state.capabilities.length) {
        el.capabilityList.innerHTML = '<div class="empty">当前筛选条件下没有 Capability。</div>';
        return;
      }

      el.capabilityList.innerHTML = state.capabilities.map(item => `
        <div class="capability-card ${item.capability_id === state.capabilityId ? "active" : ""}" data-capability-id="${escapeHtml(item.capability_id)}">
          <div class="title">${escapeHtml(item.capability_name)}</div>
          <div>
            <span class="tag">${escapeHtml(item.biz_domain)}</span>
            <span class="tag">${escapeHtml(item.capability_id)}</span>
            <span class="tag ${getCapabilitySource(item.capability_id) === "local" ? "success" : "warning"}">${escapeHtml(getCapabilitySource(item.capability_id))}</span>
            ${item.health_status ? `<span class="tag ${item.health_status === "healthy" ? "success" : item.health_status === "unhealthy" ? "danger" : ""}">health:${escapeHtml(item.health_status)}</span>` : ""}
          </div>
          <div class="subtle">${escapeHtml(item.description || "暂无描述")}</div>
          <div class="subtle">priority ${escapeHtml(item.priority)} / risk ${escapeHtml(item.risk_level || "-")} / transport ${escapeHtml(item.transport || "-")}</div>
        </div>
      `).join("");

      el.capabilityList.querySelectorAll("[data-capability-id]").forEach(node => {
        node.addEventListener("click", () => {
          const capabilityId = node.getAttribute("data-capability-id") || "";
          state.capabilityId = capabilityId;
          el.capabilityIdInput.value = capabilityId;
          state.selectedCapability = state.capabilities.find(item => item.capability_id === capabilityId) || null;
          renderCapabilityList();
          renderCapabilityDetail();
          updateQuery();
        });
      });
    }

    function renderCapabilityDetail() {
      const item = state.selectedCapability;
      if (!item) {
        el.capabilityDetail.innerHTML = '<div class="empty">请选择左侧 Capability 查看详情。</div>';
        return;
      }
      const external = getExternalMetadata(item.capability_id);
      const source = getCapabilitySource(item.capability_id);
      el.capabilityDetail.innerHTML = `
        <div class="hero">
          <div class="subtle">${escapeHtml(item.biz_domain)} / ${escapeHtml(item.capability_id)}</div>
          <strong>${escapeHtml(item.capability_name)}</strong>
          <div class="subtle" style="margin-top: 10px;">${escapeHtml(item.description || "该能力当前未填写描述。")}</div>
        </div>

        <div class="detail-card">
          <div class="detail-grid">
            <div class="detail-row"><div class="label">来源</div><div class="value">${escapeHtml(source)}</div></div>
            <div class="detail-row"><div class="label">业务域</div><div class="value">${escapeHtml(item.biz_domain)}</div></div>
            <div class="detail-row"><div class="label">优先级</div><div class="value">${escapeHtml(item.priority)}</div></div>
            <div class="detail-row"><div class="label">版本</div><div class="value">${escapeHtml(item.version || "-")}</div></div>
            <div class="detail-row"><div class="label">风险等级</div><div class="value">${escapeHtml(item.risk_level || "-")}</div></div>
            <div class="detail-row"><div class="label">需要审批</div><div class="value">${escapeHtml(item.requires_approval ? "true" : "false")}</div></div>
            <div class="detail-row"><div class="label">Transport</div><div class="value">${escapeHtml(item.transport || "-")}</div></div>
            <div class="detail-row"><div class="label">Health</div><div class="value">${escapeHtml(item.health_status || "-")}</div></div>
            <div class="detail-row"><div class="label">最近检查</div><div class="value">${escapeHtml(item.last_check_time || "-")}</div></div>
            <div class="detail-row"><div class="label">最近延迟</div><div class="value">${escapeHtml(item.last_latency_ms ?? "-")}${item.last_latency_ms != null ? " ms" : ""}</div></div>
            <div class="detail-row"><div class="label">Skill 数</div><div class="value">${escapeHtml((item.skills || []).length)}</div></div>
            <div class="detail-row"><div class="label">Trigger 数</div><div class="value">${escapeHtml((item.triggers || []).length)}</div></div>
          </div>
        </div>

        <div class="section-split">
          <h2>Declared Skills</h2>
          ${renderTagList(item.skills || [], "warning")}
          ${(item.skills || []).length
            ? `<div class="chips">${(item.skills || []).map(skill => `
              <button class="secondary" type="button" data-open-skill="${escapeHtml(skill)}">打开 ${escapeHtml(skill)}</button>
            `).join("")}</div>`
            : ""}
        </div>

        <div class="section-split">
          <h2>Triggers</h2>
          ${renderTagList(item.triggers || [])}
        </div>

        <div class="section-split">
          <h2>Tags</h2>
          ${renderTagList(item.tags || [], "warning")}
        </div>

        <div class="section-split">
          <h2>Integration Info</h2>
          ${(external || item.transport !== "inproc") ? `
            <div class="detail-card">
              <div class="detail-grid">
                <div class="detail-row"><div class="label">Endpoint</div><div class="value">${escapeHtml(item.endpoint || "-")}</div></div>
                <div class="detail-row"><div class="label">Service Path</div><div class="value">${escapeHtml(item.service_path || "-")}</div></div>
                <div class="detail-row"><div class="label">Service Name</div><div class="value">${escapeHtml(item.service_name || "-")}</div></div>
                <div class="detail-row"><div class="label">Service Host</div><div class="value">${escapeHtml(item.service_host || "-")}</div></div>
                <div class="detail-row"><div class="label">Service Port</div><div class="value">${escapeHtml(item.service_port ?? "-")}</div></div>
              </div>
            </div>
          ` : '<div class="empty">当前为本地内置能力，没有额外的远端接入元数据。</div>'}
        </div>

        <div class="section-split">
          <h2>Extras</h2>
          ${Object.keys(item.extras || {}).length
            ? `<div class="detail-card"><div class="detail-grid">${Object.entries(item.extras || {}).map(([key, value]) => `
              <div class="detail-row"><div class="label">${escapeHtml(key)}</div><div class="value">${escapeHtml(value)}</div></div>
            `).join("")}</div></div>`
            : '<div class="empty">暂无 extras 元数据。</div>'}
        </div>

        <div class="section-split">
          <h2>Recent Tasks</h2>
          <div id="capabilityRecentTaskList">${renderRecentTasks()}</div>
        </div>

        <div class="section-split">
          <h2>Quick Actions</h2>
          <div class="chips">
            <button id="openTaskPageBtn" class="secondary" type="button">去任务面板</button>
            <button id="openExternalAgentBtn" class="secondary" type="button">去外部 Agent 管理</button>
            ${(item.skills || [])[0] ? '<button id="openSkillPageBtn" class="secondary" type="button">查看首个 Skill</button>' : ""}
          </div>
        </div>
      `;

      const openTaskPageBtn = document.getElementById("openTaskPageBtn");
      const openExternalAgentBtn = document.getElementById("openExternalAgentBtn");
      const openSkillPageBtn = document.getElementById("openSkillPageBtn");
      el.capabilityDetail.querySelectorAll("[data-open-skill]").forEach(node => {
        node.addEventListener("click", () => {
          const skillId = node.getAttribute("data-open-skill") || "";
          if (!skillId) {
            return;
          }
          window.location.href = `/ui/skills?skill_id=${encodeURIComponent(skillId)}&capability_id=${encodeURIComponent(item.capability_id)}`;
        });
      });

      if (openTaskPageBtn) {
        openTaskPageBtn.addEventListener("click", () => {
          window.location.href = `/ui/tasks?selected_agent_id=${encodeURIComponent(item.capability_id)}`;
        });
      }
      if (openExternalAgentBtn) {
        openExternalAgentBtn.addEventListener("click", () => {
          window.location.href = `/ui/external-agents?capability_id=${encodeURIComponent(item.capability_id)}`;
        });
      }
      if (openSkillPageBtn && (item.skills || [])[0]) {
        openSkillPageBtn.addEventListener("click", () => {
          window.location.href = `/ui/skills?skill_id=${encodeURIComponent(item.skills[0])}`;
        });
      }
    }

    function renderRecentTasks() {
      if (!state.selectedCapability) {
        return '<div class="empty">请先选择 Capability，再查看最近任务。</div>';
      }
      if (!state.recentTasks.length) {
        return '<div class="empty">当前 Capability 暂无最近任务记录。</div>';
      }
      return `
        <div class="stack">
          ${state.recentTasks.map(task => `
            <div class="detail-card">
              <div class="detail-grid">
                <div class="detail-row"><div class="label">Task ID</div><div class="value">${escapeHtml(task.task_id)}</div></div>
                <div class="detail-row"><div class="label">Status / Stage</div><div class="value">${escapeHtml(task.status)} / ${escapeHtml(task.current_stage || "-")}</div></div>
                <div class="detail-row"><div class="label">Started At</div><div class="value">${escapeHtml(task.start_time)}</div></div>
                <div class="detail-row"><div class="label">Risk / Approval</div><div class="value">${escapeHtml(task.risk_level || "-")} / ${escapeHtml(task.approval_required ? "true" : "false")}</div></div>
                <div class="detail-row"><div class="label">Goal</div><div class="value">${escapeHtml(task.task_goal || task.task_title || "-")}</div></div>
                <div class="detail-row"><div class="label">Output</div><div class="value">${escapeHtml(task.final_output_summary || "-")}</div></div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    async function loadRecentTasks(capabilityId) {
      if (!capabilityId) {
        state.recentTasks = [];
        return;
      }
      try {
        state.recentTasks = await fetchJson(
          `/api/capabilities/${encodeURIComponent(capabilityId)}/recent-tasks?limit=5`
        );
      } catch (_error) {
        state.recentTasks = [];
      }
    }

    async function loadCapabilities() {
      const query = new URLSearchParams();
      if (el.domainFilter.value) query.set("biz_domain", el.domainFilter.value);
      if (el.sourceFilter.value) query.set("source", el.sourceFilter.value);
      if (el.riskFilter.value) query.set("risk_level", el.riskFilter.value);
      if (el.approvalFilter.value) query.set("requires_approval", el.approvalFilter.value);
      if (el.transportFilter.value) query.set("transport", el.transportFilter.value);
      if (el.healthFilter.value) query.set("health_status", el.healthFilter.value);
      if (el.skillFilterInput.value.trim()) query.set("skill_id", el.skillFilterInput.value.trim());

      const [capabilities, externalAgents, overview] = await Promise.all([
        fetchJson(`/api/capabilities?${query.toString()}`),
        fetchJson("/api/external-agents"),
        fetchJson("/api/capabilities/overview/summary"),
      ]);
      state.capabilities = capabilities;
      state.externalAgents = externalAgents;
      renderOverview(overview);
      renderCapabilityList();
      updateQuery();

      if (!state.capabilityId && state.capabilities[0]?.capability_id) {
        state.capabilityId = state.capabilities[0].capability_id;
        el.capabilityIdInput.value = state.capabilityId;
      }
    }

    function loadCapabilityDetail() {
      const capabilityId = el.capabilityIdInput.value.trim() || state.capabilityId;
      if (!capabilityId) return;
      state.capabilityId = capabilityId;
      Promise.all([
        fetchJson(`/api/capabilities/${encodeURIComponent(capabilityId)}`),
        loadRecentTasks(capabilityId),
      ])
        .then(([detail]) => {
          state.selectedCapability = detail;
          renderCapabilityList();
          renderCapabilityDetail();
          updateQuery();
        })
        .catch(() => {
          state.selectedCapability = null;
          state.recentTasks = [];
          renderCapabilityList();
          renderCapabilityDetail();
        });
    }

    async function bootstrap() {
      const query = new URLSearchParams(window.location.search);
      state.capabilityId = query.get("capability_id") || "";
      el.capabilityIdInput.value = state.capabilityId;
      el.domainFilter.value = query.get("biz_domain") || "";
      el.sourceFilter.value = query.get("source") || "";
      el.riskFilter.value = query.get("risk_level") || "";
      el.approvalFilter.value = query.get("requires_approval") || "";
      el.transportFilter.value = query.get("transport") || "";
      el.healthFilter.value = query.get("health_status") || "";
      el.skillFilterInput.value = query.get("skill_id") || "";
      await loadCapabilities();
      if (state.capabilityId) {
        loadCapabilityDetail();
      } else if (state.capabilities[0]?.capability_id) {
        state.capabilityId = state.capabilities[0].capability_id;
        el.capabilityIdInput.value = state.capabilityId;
        loadCapabilityDetail();
      }
    }

    el.taskPageBtn.addEventListener("click", () => {
      window.location.href = "/ui/tasks";
    });
    el.agentPageBtn.addEventListener("click", () => {
      window.location.href = "/ui/external-agents";
    });
    el.workflowPageBtn.addEventListener("click", () => {
      window.location.href = "/ui/workflows";
    });
    el.skillPageBtn.addEventListener("click", () => {
      window.location.href = "/ui/skills";
    });
    [el.domainFilter, el.sourceFilter, el.riskFilter, el.approvalFilter, el.transportFilter, el.healthFilter].forEach(node => {
      node.addEventListener("change", bootstrap);
    });
    el.skillFilterInput.addEventListener("keydown", async event => {
      if (event.key === "Enter") await bootstrap();
    });
    el.loadBtn.addEventListener("click", loadCapabilityDetail);
    el.refreshBtn.addEventListener("click", bootstrap);
    el.capabilityIdInput.addEventListener("keydown", event => {
      if (event.key === "Enter") loadCapabilityDetail();
    });

    bootstrap();
  </script>
</body>
</html>
