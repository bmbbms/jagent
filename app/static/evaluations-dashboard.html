<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent 评估中心</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: #fffdf9;
      --line: #e6d7c4;
      --text: #221a13;
      --muted: #6f6559;
      --accent: #9a4f25;
      --success: #1d7a4a;
      --warning: #9b6d1f;
      --danger: #b53f35;
      --radius: 18px;
      --shadow: 0 16px 36px rgba(73, 42, 19, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
    }
    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 30px;
    }
    .header p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 860px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar button,
    .toolbar input,
    .toolbar select {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 10px 14px;
      color: var(--text);
    }
    .toolbar button {
      background: var(--accent);
      border: 0;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    .toolbar button.secondary {
      background: #eadcc9;
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 20px;
    }
    .panel {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .list,
    .overview-grid,
    .stats,
    .details {
      display: grid;
      gap: 10px;
    }
    .overview-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 18px;
    }
    .overview-card {
      background: linear-gradient(135deg, #fff6ec 0%, #fffdf9 100%);
      border: 1px solid #eadcca;
      border-radius: 14px;
      padding: 14px;
    }
    .overview-card strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
      color: var(--accent);
      line-height: 1;
    }
    .card {
      background: var(--panel);
      border: 1px solid #eadcca;
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(154, 79, 37, 0.14);
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
    }
    .subtle,
    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f2e4d5;
      color: #6d563f;
    }
    .success { background: rgba(29, 122, 74, 0.12); color: var(--success); }
    .warning { background: rgba(155, 109, 31, 0.14); color: var(--warning); }
    .danger { background: rgba(181, 63, 53, 0.12); color: var(--danger); }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(230, 215, 196, 0.95);
      padding-bottom: 8px;
      font-size: 14px;
    }
    .row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .label {
      color: var(--muted);
      flex: 0 0 140px;
    }
    .value {
      flex: 1;
      text-align: right;
      word-break: break-word;
    }
    .hero {
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff6ec 0%, #fffdf9 100%);
      border: 1px solid #eadcca;
      margin-bottom: 14px;
    }
    .hero strong {
      font-size: 34px;
      color: var(--accent);
      line-height: 1;
    }
    .section-split {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #eadcca;
    }
    .inline-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .inline-form input,
    .inline-form select,
    .inline-form button {
      min-height: 36px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 8px 10px;
      font: inherit;
      background: var(--panel);
      color: var(--text);
    }
    .inline-form button {
      background: var(--accent);
      border: 0;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .overview-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>Agent 评估中心</h1>
        <p>集中查看任务级评估结果、维度得分与优化建议，并把评估建议转成可跟踪的优化工作项，帮助我们持续评估和优化各类 Agent 的运行质量。</p>
      </div>
      <div class="toolbar">
        <button id="taskPageBtn" class="secondary">任务面板</button>
        <input id="evaluationIdInput" placeholder="输入 evaluation_id 可直接打开" />
        <input id="agentFilterInput" placeholder="按 agent_id 过滤" />
        <input id="resultFilterInput" placeholder="按结果标签过滤" />
        <input id="minScoreInput" type="number" min="0" max="100" step="1" placeholder="最低分" />
        <select id="attentionFilter">
          <option value="">全部关注级别</option>
          <option value="high">high</option>
          <option value="normal">normal</option>
        </select>
        <input id="startDateFrom" type="date" />
        <input id="startDateTo" type="date" />
        <button id="loadBtn">加载评估</button>
        <button id="refreshBtn" class="secondary">刷新列表</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>评估总览</h2>
        <div id="overviewGrid" class="overview-grid">
          <div class="empty">正在加载评估总览...</div>
        </div>

        <h2>Agent 评估分析</h2>
        <div id="analyticsList" class="list" style="margin-bottom: 18px;">
          <div class="empty">正在加载评估分析...</div>
        </div>

        <h2>最近评估</h2>
        <div id="evaluationList" class="list">
          <div class="empty">正在加载评估列表...</div>
        </div>

        <div class="section-split">
          <h2>优化建议概览</h2>
          <div id="suggestionOverviewGrid" class="overview-grid">
            <div class="empty">正在加载优化建议概览...</div>
          </div>

          <div class="inline-form" style="margin-bottom: 12px;">
            <select id="suggestionStatusFilter">
              <option value="">全部状态</option>
              <option value="new">new</option>
              <option value="in_progress">in_progress</option>
              <option value="completed">completed</option>
            </select>
            <input id="suggestionOwnerFilter" placeholder="按 owner 过滤建议" />
            <button id="loadSuggestionsBtn">加载建议</button>
          </div>

          <div id="suggestionList" class="list">
            <div class="empty">正在加载优化建议列表...</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>评估详情</h2>
        <div id="evaluationDetail">
          <div class="empty">请选择左侧评估记录查看详情。</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      evaluationId: "",
      evaluations: [],
      analytics: [],
      overview: null,
      suggestions: [],
      suggestionOverview: null,
      selectedAnalyticsAgentId: "",
    };

    const el = {
      taskPageBtn: document.getElementById("taskPageBtn"),
      evaluationIdInput: document.getElementById("evaluationIdInput"),
      agentFilterInput: document.getElementById("agentFilterInput"),
      resultFilterInput: document.getElementById("resultFilterInput"),
      minScoreInput: document.getElementById("minScoreInput"),
      attentionFilter: document.getElementById("attentionFilter"),
      startDateFrom: document.getElementById("startDateFrom"),
      startDateTo: document.getElementById("startDateTo"),
      loadBtn: document.getElementById("loadBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      overviewGrid: document.getElementById("overviewGrid"),
      analyticsList: document.getElementById("analyticsList"),
      evaluationList: document.getElementById("evaluationList"),
      evaluationDetail: document.getElementById("evaluationDetail"),
      suggestionOverviewGrid: document.getElementById("suggestionOverviewGrid"),
      suggestionStatusFilter: document.getElementById("suggestionStatusFilter"),
      suggestionOwnerFilter: document.getElementById("suggestionOwnerFilter"),
      loadSuggestionsBtn: document.getElementById("loadSuggestionsBtn"),
      suggestionList: document.getElementById("suggestionList"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function toneByScore(score) {
      if (score >= 90) return "success";
      if (score >= 75) return "warning";
      return "danger";
    }

    function toneByAttention(level) {
      return level === "high" ? "danger" : "success";
    }

    function toneByStatus(status) {
      if (status === "completed") return "success";
      if (status === "in_progress") return "warning";
      return "";
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const text = await response.text();
      const body = text ? JSON.parse(text) : null;
      if (!response.ok) {
        throw new Error(body?.detail || `HTTP ${response.status}`);
      }
      return body;
    }

    function syncQuery() {
      const url = new URL(window.location.href);
      const pairs = {
        evaluation_id: state.evaluationId,
        agent_id: el.agentFilterInput.value.trim(),
        result_label: el.resultFilterInput.value.trim(),
        min_overall_score: el.minScoreInput.value.trim(),
        attention_level: el.attentionFilter.value,
        start_date_from: el.startDateFrom.value,
        start_date_to: el.startDateTo.value,
        suggestion_status: el.suggestionStatusFilter.value,
        suggestion_owner: el.suggestionOwnerFilter.value.trim(),
      };
      Object.entries(pairs).forEach(([key, value]) => {
        if (value) {
          url.searchParams.set(key, value);
        } else {
          url.searchParams.delete(key);
        }
      });
      window.history.replaceState({}, "", url);
    }

    function renderOverview() {
      if (!state.overview) {
        el.overviewGrid.innerHTML = '<div class="empty">暂无评估总览。</div>';
        return;
      }
      const cards = [
        ["评估总数", state.overview.evaluation_count],
        ["Agent 数量", state.overview.agent_count],
        ["低分评估数", state.overview.poor_evaluation_count],
        ["高关注 Agent 数", state.overview.high_attention_agent_count],
        ["平均总分", state.overview.average_overall_score],
        ["平均效率分", state.overview.average_efficiency_score],
      ];
      el.overviewGrid.innerHTML = cards.map(([label, value]) => `
        <div class="overview-card">
          <div class="subtle">${escapeHtml(label)}</div>
          <strong>${escapeHtml(value)}</strong>
        </div>
      `).join("");
    }

    function renderSuggestionOverview() {
      if (!state.suggestionOverview) {
        el.suggestionOverviewGrid.innerHTML = '<div class="empty">暂无优化建议概览。</div>';
        return;
      }
      const cards = [
        ["建议总数", state.suggestionOverview.total],
        ["新建", state.suggestionOverview.new_count],
        ["进行中", state.suggestionOverview.in_progress_count],
        ["已完成", state.suggestionOverview.completed_count],
        ["高优先级", state.suggestionOverview.high_priority_count],
      ];
      el.suggestionOverviewGrid.innerHTML = cards.map(([label, value]) => `
        <div class="overview-card">
          <div class="subtle">${escapeHtml(label)}</div>
          <strong>${escapeHtml(value)}</strong>
        </div>
      `).join("");
    }

    function renderAnalyticsList() {
      if (!state.analytics.length) {
        el.analyticsList.innerHTML = '<div class="empty">暂无分析结果。</div>';
        return;
      }

      el.analyticsList.innerHTML = state.analytics.map(item => `
        <div class="card ${item.agent_id === state.selectedAnalyticsAgentId ? "active" : ""}" data-agent-id="${escapeHtml(item.agent_id)}">
          <div class="title">${escapeHtml(item.agent_id)}</div>
          <div>
            <span class="tag ${toneByScore(item.average_overall_score)}">${escapeHtml(item.average_overall_score)}</span>
            <span class="tag ${toneByAttention(item.attention_level)}">${escapeHtml(item.attention_level)}</span>
          </div>
          <div class="subtle">评估数：${escapeHtml(item.evaluation_count)}</div>
          <div class="subtle">excellent / good / poor：${escapeHtml(item.excellent_count)} / ${escapeHtml(item.good_count)} / ${escapeHtml(item.poor_count)}</div>
          <div class="subtle">效率均分：${escapeHtml(item.average_efficiency_score)} / 工具均分：${escapeHtml(item.average_tool_usage_score)}</div>
          <div class="subtle">poor rate：${escapeHtml(item.poor_rate)}% / fallback 关联：${escapeHtml(item.fallback_related_count)}</div>
        </div>
      `).join("");

      el.analyticsList.querySelectorAll("[data-agent-id]").forEach(node => {
        node.addEventListener("click", async () => {
          const agentId = node.getAttribute("data-agent-id") || "";
          state.selectedAnalyticsAgentId = agentId;
          el.agentFilterInput.value = agentId;
          await loadEvaluationList();
          await loadSuggestionOverview();
          await loadSuggestions();
          renderAnalyticsList();
        });
      });
    }

    function renderEvaluationList() {
      if (!state.evaluations.length) {
        el.evaluationList.innerHTML = '<div class="empty">暂无评估记录。</div>';
        return;
      }

      el.evaluationList.innerHTML = state.evaluations.map(item => `
        <div class="card ${item.evaluation_id === state.evaluationId ? "active" : ""}" data-evaluation-id="${escapeHtml(item.evaluation_id)}">
          <div class="title">${escapeHtml(item.agent_id)} / ${escapeHtml(item.task_id)}</div>
          <div><span class="tag ${toneByScore(item.overall_score)}">${escapeHtml(item.result_label)} / ${escapeHtml(item.overall_score)}</span></div>
          <div class="subtle">评估 Agent：${escapeHtml(item.evaluator_agent_id)}</div>
          <div class="subtle">时间：${escapeHtml(formatDate(item.create_time))}</div>
        </div>
      `).join("");

      el.evaluationList.querySelectorAll("[data-evaluation-id]").forEach(node => {
        node.addEventListener("click", async () => {
          const evaluationId = node.getAttribute("data-evaluation-id") || "";
          state.evaluationId = evaluationId;
          el.evaluationIdInput.value = evaluationId;
          await loadEvaluationDetail();
        });
      });
    }

    function renderEvaluationDetail(detail) {
      const detailsHtml = (detail.details || []).map(item => `
        <div class="row">
          <div class="label">${escapeHtml(item.dimension_name)}</div>
          <div class="value">${escapeHtml(item.score)}</div>
        </div>
      `).join("");

      const suggestionsHtml = (detail.suggestions || []).length
        ? detail.suggestions.map(item => `
          <div class="card">
            <div class="title">${escapeHtml(item.optimization_type)}</div>
            <div>
              <span class="tag ${toneByStatus(item.status)}">${escapeHtml(item.status)}</span>
              <span class="tag">${escapeHtml(item.priority)}</span>
              <span class="tag">${escapeHtml(item.owner || "unassigned")}</span>
            </div>
            <div class="subtle">${escapeHtml(item.suggested_change)}</div>
            <div class="subtle">suggestion_id：${escapeHtml(item.suggestion_id)} / 更新时间：${escapeHtml(formatDate(item.update_time))}</div>
          </div>
        `).join("")
        : '<div class="empty">暂无优化建议。</div>';

      el.evaluationDetail.innerHTML = `
        <div class="hero">
          <div class="subtle">${escapeHtml(detail.agent_id)} / ${escapeHtml(detail.task_id)}</div>
          <div style="margin-top: 8px;"><strong>${escapeHtml(detail.overall_score)}</strong></div>
          <div class="subtle" style="margin-top: 8px;">${escapeHtml(detail.summary || "-")}</div>
        </div>
        <div class="stats">
          <div class="row"><div class="label">结果标签</div><div class="value">${escapeHtml(detail.result_label)}</div></div>
          <div class="row"><div class="label">完成度</div><div class="value">${escapeHtml(detail.completion_score)}</div></div>
          <div class="row"><div class="label">准确性</div><div class="value">${escapeHtml(detail.accuracy_score)}</div></div>
          <div class="row"><div class="label">工具使用</div><div class="value">${escapeHtml(detail.tool_usage_score)}</div></div>
          <div class="row"><div class="label">效率</div><div class="value">${escapeHtml(detail.efficiency_score)}</div></div>
          <div class="row"><div class="label">合规</div><div class="value">${escapeHtml(detail.compliance_score)}</div></div>
          <div class="row"><div class="label">成本</div><div class="value">${escapeHtml(detail.cost_score)}</div></div>
        </div>
        <h2 style="margin-top: 18px;">维度明细</h2>
        <div class="details">${detailsHtml || '<div class="empty">暂无维度明细。</div>'}</div>
        <h2 style="margin-top: 18px;">优化建议</h2>
        <div class="list">${suggestionsHtml}</div>
      `;
    }

    function renderSuggestionList() {
      if (!state.suggestions.length) {
        el.suggestionList.innerHTML = '<div class="empty">暂无优化建议工作项。</div>';
        return;
      }

      el.suggestionList.innerHTML = state.suggestions.map(item => `
        <div class="card">
          <div class="title">${escapeHtml(item.optimization_type)} / ${escapeHtml(item.target_ref || "-")}</div>
          <div>
            <span class="tag ${toneByStatus(item.status)}">${escapeHtml(item.status)}</span>
            <span class="tag">${escapeHtml(item.priority)}</span>
            <span class="tag">${escapeHtml(item.owner || "unassigned")}</span>
          </div>
          <div class="subtle">${escapeHtml(item.suggested_change)}</div>
          <div class="subtle">suggestion_id：${escapeHtml(item.suggestion_id)} / 更新时间：${escapeHtml(formatDate(item.update_time))}</div>
          <div class="inline-form">
            <input data-owner-input="${escapeHtml(item.suggestion_id)}" placeholder="owner" value="${escapeHtml(item.owner || "")}" />
            <select data-status-input="${escapeHtml(item.suggestion_id)}">
              <option value="new" ${item.status === "new" ? "selected" : ""}>new</option>
              <option value="in_progress" ${item.status === "in_progress" ? "selected" : ""}>in_progress</option>
              <option value="completed" ${item.status === "completed" ? "selected" : ""}>completed</option>
            </select>
            <select data-priority-input="${escapeHtml(item.suggestion_id)}">
              <option value="high" ${item.priority === "high" ? "selected" : ""}>high</option>
              <option value="medium" ${item.priority === "medium" ? "selected" : ""}>medium</option>
              <option value="low" ${item.priority === "low" ? "selected" : ""}>low</option>
            </select>
            <button data-save-suggestion="${escapeHtml(item.suggestion_id)}">保存</button>
          </div>
        </div>
      `).join("");

      el.suggestionList.querySelectorAll("[data-save-suggestion]").forEach(node => {
        node.addEventListener("click", async () => {
          const suggestionId = node.getAttribute("data-save-suggestion");
          const ownerNode = document.querySelector(`[data-owner-input="${suggestionId}"]`);
          const statusNode = document.querySelector(`[data-status-input="${suggestionId}"]`);
          const priorityNode = document.querySelector(`[data-priority-input="${suggestionId}"]`);
          await fetchJson(`/api/evaluations/suggestions/${encodeURIComponent(suggestionId)}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              owner: ownerNode?.value.trim() || null,
              status: statusNode?.value || null,
              priority: priorityNode?.value || null,
            }),
          });
          await loadSuggestionOverview();
          await loadSuggestions();
          if (state.evaluationId) {
            await loadEvaluationDetail();
          }
        });
      });
    }

    function buildEvaluationListQuery() {
      const query = new URLSearchParams();
      if (el.agentFilterInput.value.trim()) query.set("agent_id", el.agentFilterInput.value.trim());
      if (el.resultFilterInput.value.trim()) query.set("result_label", el.resultFilterInput.value.trim());
      if (el.minScoreInput.value.trim()) query.set("min_overall_score", el.minScoreInput.value.trim());
      if (el.attentionFilter.value) query.set("attention_level", el.attentionFilter.value);
      if (el.startDateFrom.value) query.set("start_date_from", el.startDateFrom.value);
      if (el.startDateTo.value) query.set("start_date_to", el.startDateTo.value);
      return query;
    }

    function buildSuggestionQuery() {
      const query = new URLSearchParams();
      if (el.agentFilterInput.value.trim()) query.set("agent_id", el.agentFilterInput.value.trim());
      if (el.suggestionStatusFilter.value) query.set("status", el.suggestionStatusFilter.value);
      if (el.suggestionOwnerFilter.value.trim()) query.set("owner", el.suggestionOwnerFilter.value.trim());
      return query;
    }

    async function loadEvaluationList() {
      const query = buildEvaluationListQuery();
      state.evaluations = await fetchJson(`/api/evaluations?${query.toString()}`);
      state.selectedAnalyticsAgentId = el.agentFilterInput.value.trim();
      renderEvaluationList();
      syncQuery();
      if (!state.evaluationId && state.evaluations[0]?.evaluation_id) {
        state.evaluationId = state.evaluations[0].evaluation_id;
        el.evaluationIdInput.value = state.evaluationId;
      }
    }

    async function loadAnalytics() {
      state.analytics = await fetchJson("/api/evaluations/analytics/by-agent");
      renderAnalyticsList();
    }

    async function loadOverview() {
      state.overview = await fetchJson("/api/evaluations/analytics/overview");
      renderOverview();
    }

    async function loadSuggestionOverview() {
      const query = new URLSearchParams();
      if (el.agentFilterInput.value.trim()) query.set("agent_id", el.agentFilterInput.value.trim());
      if (el.suggestionOwnerFilter.value.trim()) query.set("owner", el.suggestionOwnerFilter.value.trim());
      state.suggestionOverview = await fetchJson(`/api/evaluations/suggestions/overview?${query.toString()}`);
      renderSuggestionOverview();
    }

    async function loadSuggestions() {
      const query = buildSuggestionQuery();
      state.suggestions = await fetchJson(`/api/evaluations/suggestions?${query.toString()}`);
      renderSuggestionList();
      syncQuery();
    }

    async function loadEvaluationDetail() {
      const evaluationId = el.evaluationIdInput.value.trim() || state.evaluationId;
      if (!evaluationId) return;
      state.evaluationId = evaluationId;
      const detail = await fetchJson(`/api/evaluations/${encodeURIComponent(evaluationId)}`);
      renderEvaluationList();
      renderEvaluationDetail(detail);
      syncQuery();
    }

    async function bootstrap() {
      const query = new URLSearchParams(window.location.search);
      state.evaluationId = query.get("evaluation_id") || "";
      state.selectedAnalyticsAgentId = query.get("agent_id") || "";
      el.agentFilterInput.value = query.get("agent_id") || "";
      el.resultFilterInput.value = query.get("result_label") || "";
      el.minScoreInput.value = query.get("min_overall_score") || "";
      el.attentionFilter.value = query.get("attention_level") || "";
      el.startDateFrom.value = query.get("start_date_from") || "";
      el.startDateTo.value = query.get("start_date_to") || "";
      el.suggestionStatusFilter.value = query.get("suggestion_status") || "";
      el.suggestionOwnerFilter.value = query.get("suggestion_owner") || "";
      el.evaluationIdInput.value = state.evaluationId;
      await loadOverview();
      await loadAnalytics();
      await loadEvaluationList();
      await loadSuggestionOverview();
      await loadSuggestions();
      if (state.evaluationId) {
        await loadEvaluationDetail();
      } else if (state.evaluations[0]?.evaluation_id) {
        state.evaluationId = state.evaluations[0].evaluation_id;
        el.evaluationIdInput.value = state.evaluationId;
        await loadEvaluationDetail();
      }
    }

    el.taskPageBtn.addEventListener("click", () => {
      window.location.href = "/ui/tasks";
    });
    el.loadBtn.addEventListener("click", loadEvaluationDetail);
    el.refreshBtn.addEventListener("click", bootstrap);
    el.loadSuggestionsBtn.addEventListener("click", async () => {
      await loadSuggestionOverview();
      await loadSuggestions();
    });
    [el.agentFilterInput, el.resultFilterInput, el.minScoreInput, el.suggestionOwnerFilter].forEach(node => {
      node.addEventListener("keydown", async event => {
        if (event.key === "Enter") await bootstrap();
      });
    });
    [el.attentionFilter, el.startDateFrom, el.startDateTo, el.suggestionStatusFilter].forEach(node => {
      node.addEventListener("change", bootstrap);
    });
    el.evaluationIdInput.addEventListener("keydown", async event => {
      if (event.key === "Enter") await loadEvaluationDetail();
    });

    bootstrap();
  </script>
</body>
</html>
