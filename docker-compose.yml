services:
  app:
    build: .
    environment:
      ACQUIRING_AI_AGENT_RUNTIME: agno
      ACQUIRING_AI_DATABASE_URL: postgresql+psycopg://acquiring_ai:acquiring_ai@postgres:5432/acquiring_ai
      ACQUIRING_AI_REDIS_URL: redis://redis:6379/0
      ACQUIRING_AI_VECTOR_STORE_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: acquiring_ai
      POSTGRES_PASSWORD: acquiring_ai
      POSTGRES_DB: acquiring_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
