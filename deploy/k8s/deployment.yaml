apiVersion: apps/v1
kind: Deployment
metadata:
  name: acquiring-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acquiring-ai
  template:
    metadata:
      labels:
        app: acquiring-ai
    spec:
      containers:
        - name: api
          image: acquiring-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ACQUIRING_AI_AGENT_RUNTIME
              value: agno
            - name: ACQUIRING_AI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: acquiring-ai-secrets
                  key: database-url
            - name: ACQUIRING_AI_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: acquiring-ai-secrets
                  key: redis-url
            - name: ACQUIRING_AI_VECTOR_STORE_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
